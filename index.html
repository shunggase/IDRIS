<!-- ✅ flex2html (แก้รูปไม่ขึ้น + รองรับ aspectRatio) -->
<script>
(function(g){
  function $(id){return typeof id=="string"?document.getElementById(id):id;}
  function make(tag,attr){const e=document.createElement(tag);for(let k in attr)e[k]=attr[k];return e;}

  // 🧮 แปลง aspectRatio เช่น 30:25 => 25/30
  function parseRatio(ratioStr){
    if(!ratioStr) return 1;
    const p = ratioStr.split(":");
    if(p.length !== 2) return 1;
    const w = parseFloat(p[0]), h = parseFloat(p[1]);
    return h === 0 ? 1 : (h / w);
  }

  function renderHero(hero){
  if(!hero || !hero.url) return null;

  // ✅ ปรับ aspectRatio เช่น "30:25" → "30/25"
  const ratioStr = hero.aspectRatio ? hero.aspectRatio.replace(":", "/") : "1/1";

  // ✅ wrapper หลัก
  const outer = document.createElement("div");
  outer.style.cssText = "display:flex;justify-content:flex-end;margin:14px 0;";

  const bubble = document.createElement("div");
  bubble.style.cssText = `
    background:#fff;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
    overflow:hidden;
    max-width:320px;
  `;

  // ✅ กล่องรูป ใช้ aspect-ratio property โดยตรง (ไม่มี padding-bottom แล้ว)
  const wrapper = document.createElement("div");
  wrapper.style.cssText = `
    width:100%;
    aspect-ratio:${ratioStr};
    position:relative;
    overflow:hidden;
    border-radius:8px;
  `;

  const img = document.createElement("img");
  img.src = hero.url.startsWith("http://") ? hero.url.replace("http://","https://") : hero.url;
  img.alt = "preview";
  img.style.cssText = `
    width:100%;
    height:100%;
    object-fit:${hero.aspectMode==="cover"?"cover":"contain"};
    display:block;
  `;

  // ✅ จัดการกรณีโหลดไม่สำเร็จ
  img.onerror = function(){
    wrapper.innerHTML = "<div style='color:#d00;text-align:center;padding:10px;'>⚠️ โหลดภาพไม่สำเร็จ</div>";
  };

  wrapper.appendChild(img);
  bubble.appendChild(wrapper);
  outer.appendChild(bubble);
  return outer;
}

  g.flex2html=function(id,json){
    const el=$(id);
    el.innerHTML="";

    // ✅ ป้องกัน error ถ้า json ไม่มี contents
    // ✅ ป้องกัน error ถ้า json ไม่มี contents
const hero = (json && json.contents && json.contents.hero) ? json.contents.hero : null;
if(!hero || !hero.url){
  Swal.fire({
    icon: 'warning',
    title: 'ไม่พบลิงก์รูปภาพ',
    text: 'กรุณาใส่ลิงก์รูปภาพก่อนแสดงตัวอย่าง',
    confirmButtonText: 'ตกลง',
    confirmButtonColor: '#007bff'
  });
  return;
}


    console.log("✅ Render image:", hero.url, "ratio:", hero.aspectRatio);
    const preview = renderHero(hero);
    if(!preview){
      el.innerHTML="<div style='text-align:center;color:#888;padding:20px;'>⚠️ ไม่สามารถแสดงภาพได้</div>";
      return;
    }

    const chatWrap = make("div",{
      style:"background:linear-gradient(#dcecff,#cfe2f8);padding:18px;border-radius:8px;display:flex;flex-direction:column;align-items:flex-end;"
    });
    chatWrap.appendChild(preview);
    el.appendChild(chatWrap);
  };
})(window);
</script>


<!-- ✅ Vue -->
<script>
window.vm = new Vue({
  el: "#app",
  data: {
    h: {
      imgUrl: "",
      linkUrl: "",
      ratio: "30:25",
      flex: ""
    }
  },
  methods: {
    validateRatio() {
      const ratio = String(this.h.ratio || "").trim();
      const match = ratio.match(/^([0-9]+(?:\.[0-9]+)?):([0-9]+(?:\.[0-9]+)?)$/);

      if (!match || parseFloat(match[1]) <= 0 || parseFloat(match[2]) <= 0) {
        Swal.fire({
          icon: "warning",
          title: "รูปแบบ Aspect Ratio ไม่ถูกต้อง",
          text: "กรุณากรอกเป็น กว้าง:สูง เช่น 30:25 หรือ 16:9",
          confirmButtonText: "ตกลง",
          confirmButtonColor: "#2f6f4e"
        });
        return false;
      }

      this.h.ratio = ratio;
      return true;
    },

    async btnFlex2html() {
      if (!this.validateRatio()) {
        return;
      }

      const imageUrl = String(this.h.imgUrl || "").trim();
      const targetUrl = String(this.h.linkUrl || "").trim() || imageUrl;

      if (!imageUrl) {
        Swal.fire({
          icon: "warning",
          title: "Please enter an image URL",
          confirmButtonText: "OK",
          confirmButtonColor: "#2f6f4e"
        });
        return;
      }

      const json = {
        type: "flex",
        altText: "sent a photo",
        contents: {
          type: "bubble",
          hero: {
            type: "image",
            url: imageUrl,
            size: "full",
            aspectRatio: this.h.ratio,
            aspectMode: "cover",
            action: { type: "uri", uri: targetUrl }
          }
        }
      };
      this.h.flex = JSON.stringify(json, null, 2);
      document.getElementById("FlexCode").value = this.h.flex;
      window.flex2html("flex2html", json);
    },

    // ✅ ฟังก์ชัน Clear ใหม่
    eraseText() {
      this.h.imgUrl = "";
      this.h.linkUrl = "";
      this.h.ratio = "";
      this.h.flex = "";
      document.getElementById("FlexCode").value = "";

      // ✅ ล้างภาพ preview
      const container = document.getElementById("flex2html");
      container.innerHTML = "";

      // ✅ Toast แจ้งผล
      Swal.fire({
        icon: "success",
        title: "ล้างข้อมูลเรียบร้อย",
        timer: 1200,
        showConfirmButton: false
      });
    }
  }
});
</script>


<!-- ✅ LINE LIFF & Share -->
<script>
function updateLineButtons(isLoggedIn){
  const loginBtn = document.getElementById("line-login-btn");
  const logoutBtn = document.getElementById("line-logout-btn");
  if(loginBtn){
    loginBtn.style.display = isLoggedIn ? "none" : "inline-flex";
  }
  if(logoutBtn){
    logoutBtn.style.display = isLoggedIn ? "inline-flex" : "none";
  }
}
async function mainLiff(){
  try{
    await liff.init({liffId:"1657384180-2M9OrWNl"});
    const loggedIn = liff.isLoggedIn();
    updateLineButtons(loggedIn);
    if(loggedIn){
      const p=await liff.getProfile();
      $("#pictureUrl").attr("src",p.pictureUrl).show();
    }
  }catch(e){console.error(e);}
}
function logIn(){
  if(liff.isLoggedIn()){
    Swal.fire({icon:"info",title:"เข้าสู่ระบบแล้ว",timer:1500,showConfirmButton:false});
  }else{liff.login();}
}
function logOut(){
  Swal.fire({title:"ออกจากระบบ LINE?",icon:"warning",showCancelButton:true,confirmButtonText:"ใช่"}).then(r=>{
    if(r.isConfirmed){liff.logout();updateLineButtons(false);location.reload();}
  });
}
async function sendShare(){
  try{
    if(!liff.isLoggedIn()){Swal.fire({icon:"warning",title:"ยังไม่ได้เข้าสู่ระบบ",timer:1500});return;}
    const raw=document.getElementById("FlexCode").value.trim();
    if(!raw){Swal.fire({icon:"warning",title:"กรุณาสร้าง Preview ก่อนแชร์",timer:1600});return;}
    const json=JSON5.parse(raw);
    Swal.fire({title:"กำลังเปิด Share Target Picker...",allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
    const res=await liff.shareTargetPicker([json]);
    Swal.close();
    if(res) Swal.fire({icon:"success",title:"แชร์สำเร็จ!",timer:1200,showConfirmButton:false});
    else Swal.fire({icon:"info",title:"ยกเลิกการแชร์",timer:900,showConfirmButton:false});
  }catch(e){Swal.fire({icon:"error",title:"เกิดข้อผิดพลาด",text:e.message});}
}
document.addEventListener("DOMContentLoaded",mainLiff);
</script>
